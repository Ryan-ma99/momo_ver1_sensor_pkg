; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = teensy
board = teensy40
framework = arduino
board_microros_distro = humble
board_microros_transport = serial 
lib_deps =
    https://github.com/micro-ROS/micro_ros_platformio
    waspinator/CD74HC4067 @ ^1.0.2
upload_protocol = custom
upload_command = tycmd upload --board $UPLOAD_PORT $SOURCE

[env:left_arm_1]
upload_port = 16846430
build_flags = -DNODE_NAME=\"left_arm_1\"

[env:left_arm_2]
upload_port = 14808190
build_flags = -DNODE_NAME=\"left_arm_2\"

[env:right_arm_1]
upload_port = 16845300
build_flags = -DNODE_NAME=\"right_arm_1\"

[env:right_arm_2]
upload_port = 16956780
build_flags = -DNODE_NAME=\"right_arm_2\"

[env:chest]
upload_port = 02330020
build_flags = -DNODE_NAME=\"chest_node\"